name: Publish to PyPI

# Publishes via PyPI Trusted Publishing (OIDC) — no API token or stored secret.
# - `release: published`  → cutting a GitHub release ships that version automatically.
# - `workflow_dispatch`   → run manually from the Actions tab (used for the first publish,
#                           since the v1.5.0 release was created before this workflow existed).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
